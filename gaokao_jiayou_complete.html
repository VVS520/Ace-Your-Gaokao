<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考加油 - 星辰大海，未来可期</title>
    <style>
        :root {
            --gold: #f0c060;
            --gold-bright: #ffd700;
            --gold-deep: #c8960c;
            --warm: #ff6b6b;
            --deep-bg: #0a0a14;
            --card-bg: rgba(20, 18, 35, 0.85);
            --text-glow: #ffe8b0;
            --accent1: #ff9a56;
            --accent2: #ffd166;
            --accent3: #f8666e;
            --star-color: #ffe9c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'STHeiti', sans-serif;
            background: var(--deep-bg);
            color: #e0d8c8;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
            position: relative;
        }

        /* === Canvas Layers === */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        #fxCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* === Navigation Dots === */
        .nav-dots {
            position: fixed;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.45);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 0 6px transparent;
        }
        .nav-dot:hover {
            background: rgba(255, 215, 0, 0.7);
            border-color: #ffd700;
            box-shadow: 0 0 18px #ffd70088;
            transform: scale(1.5);
        }
        .nav-dot.active {
            background: #ffd700;
            border-color: #fff3c0;
            box-shadow: 0 0 22px #ffd700cc, 0 0 44px #ffa50066;
            width: 14px;
            height: 14px;
            animation: dotPulse 1.8s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 22px #ffd700cc, 0 0 44px #ffa50066;
            }
            50% {
                box-shadow: 0 0 36px #ffd700ff, 0 0 60px #ffa500aa;
            }
        }
        .nav-dot-label {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            font-size: 12px;
            color: #ffd700;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .nav-dot:hover .nav-dot-label {
            opacity: 1;
        }

        /* === Sections Container === */
        .sections-wrapper {
            position: relative;
            z-index: 1;
        }
        .section {
            scroll-snap-align: start;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px 20px;
            overflow: hidden;
        }

        /* === Section 1: Hero === */
        .section-hero {
            padding-top: 60px;
        }
        .hero-title-container {
            position: relative;
            perspective: 800px;
            margin-bottom: 10px;
        }
        .hero-char-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 18px;
            margin: 6px 0;
        }
        .hero-char {
            display: inline-block;
            font-size: clamp(42px, 8vw, 90px);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: #fff;
            text-shadow: 0 0 30px #ffb800, 0 0 60px #ff8c00, 0 0 100px #ff6600, 0 4px 10px rgba(0, 0, 0, 0.5);
            animation: charFloat 3s ease-in-out infinite;
            cursor: default;
            transition: transform 0.3s, text-shadow 0.3s;
            position: relative;
        }
        .hero-char:nth-child(1) {
            animation-delay: 0s;
        }
        .hero-char:nth-child(2) {
            animation-delay: 0.18s;
        }
        .hero-char:nth-child(3) {
            animation-delay: 0.36s;
        }
        .hero-char:nth-child(4) {
            animation-delay: 0.54s;
        }
        .hero-char:nth-child(5) {
            animation-delay: 0.72s;
        }
        .hero-char:nth-child(6) {
            animation-delay: 0.9s;
        }
        .hero-char:nth-child(7) {
            animation-delay: 1.08s;
        }
        .hero-char:nth-child(8) {
            animation-delay: 1.26s;
        }
        .hero-char:hover {
            transform: translateY(-16px) scale(1.2) rotateZ(3deg);
            text-shadow: 0 0 50px #fff, 0 0 90px #ffb800, 0 0 140px #ff6600, 0 8px 20px rgba(0, 0, 0, 0.6);
            z-index: 5;
            animation-play-state: paused;
        }
        @keyframes charFloat {
            0%,
            100% {
                transform: translateY(0px) rotateZ(0deg);
            }
            25% {
                transform: translateY(-8px) rotateZ(0.6deg);
            }
            50% {
                transform: translateY(-2px) rotateZ(-0.3deg);
            }
            75% {
                transform: translateY(-10px) rotateZ(0.4deg);
            }
        }

        .hero-subtitle {
            font-size: clamp(16px, 2.5vw, 22px);
            letter-spacing: 0.25em;
            color: #ffd590;
            text-align: center;
            margin-top: 8px;
            opacity: 0.85;
            animation: subtitleShimmer 4s ease-in-out infinite;
        }
        @keyframes subtitleShimmer {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px #ffd70088;
            }
        }

        .countdown-wrap {
            margin-top: 28px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .countdown-item {
            background: rgba(30, 25, 40, 0.75);
            border: 1px solid rgba(255, 200, 60, 0.35);
            border-radius: 16px;
            padding: 18px 20px;
            text-align: center;
            min-width: 70px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s;
            animation: countBreathe 2.5s ease-in-out infinite;
        }
        .countdown-item:nth-child(1) {
            animation-delay: 0s;
        }
        .countdown-item:nth-child(2) {
            animation-delay: 0.4s;
        }
        .countdown-item:nth-child(3) {
            animation-delay: 0.8s;
        }
        .countdown-item:nth-child(4) {
            animation-delay: 1.2s;
        }
        @keyframes countBreathe {
            0%,
            100% {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }
            50% {
                box-shadow: 0 8px 40px rgba(255, 170, 30, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            }
        }
        .countdown-num {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 18px #ffb800;
            line-height: 1;
            display: block;
        }
        .countdown-label {
            font-size: 12px;
            color: #c0a870;
            letter-spacing: 2px;
            margin-top: 4px;
            display: block;
        }

        .hero-hint {
            position: absolute;
            bottom: 40px;
            font-size: 13px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.45);
            animation: hintBounce 2s ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
        }
        @keyframes hintBounce {
            0%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-14px);
                opacity: 0.85;
            }
        }

        /* === Section 2: Card Wall === */
        .section-cards {
            position: relative;
        }
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 900px;
            perspective: 1200px;
            padding: 20px;
        }
        .flip-card {
            width: 150px;
            height: 200px;
            cursor: pointer;
            perspective: 800px;
            transition: transform 0.3s;
        }
        .flip-card:hover {
            transform: translateY(-8px);
            z-index: 5;
        }
        .flip-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front,
        .flip-card-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 200, 80, 0.25);
        }
        .flip-card-front {
            background: linear-gradient(145deg, rgba(35, 28, 50, 0.9), rgba(20, 16, 35, 0.95));
            color: #ffd700;
            font-size: 36px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px #ffb80055;
        }
        .flip-card-back {
            background: linear-gradient(145deg, rgba(50, 30, 20, 0.9), rgba(35, 20, 30, 0.95));
            color: #ffe4b0;
            transform: rotateY(180deg);
            font-size: 15px;
            letter-spacing: 1px;
            line-height: 1.5;
            border-color: rgba(255, 150, 50, 0.4);
            box-shadow: 0 10px 35px rgba(255, 130, 30, 0.25);
        }
        .flip-card-front .card-icon {
            font-size: 50px;
            margin-bottom: 6px;
        }
        .flip-card-front .card-label {
            font-size: 13px;
            letter-spacing: 2px;
            color: #c0a060;
        }

        @media (max-width: 600px) {
            .flip-card {
                width: 110px;
                height: 155px;
            }
            .flip-card-front {
                font-size: 28px;
            }
            .flip-card-front .card-icon {
                font-size: 36px;
            }
            .flip-card-back {
                font-size: 12px;
            }
            .cards-grid {
                gap: 12px;
            }
        }

        /* === Section 3: Star Wish === */
        .section-stars {
            cursor: crosshair;
            position: relative;
        }
        .star-wish-hint {
            position: absolute;
            top: 28px;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: 2px;
            color: rgba(255, 220, 150, 0.7);
            text-align: center;
            pointer-events: none;
            z-index: 2;
            animation: hintBounce 3s ease-in-out infinite;
        }
        .placed-star {
            position: absolute;
            font-size: 28px;
            cursor: grab;
            pointer-events: auto;
            z-index: 3;
            transition: filter 0.3s;
            filter: drop-shadow(0 0 8px #ffd700aa);
            animation: starTwinkle 2s ease-in-out infinite;
            user-select: none;
            -webkit-user-drag: none;
        }
        .placed-star:active {
            cursor: grabbing;
            filter: drop-shadow(0 0 20px #ffd700ff) drop-shadow(0 0 40px #ffaa00);
        }
        .placed-star .wish-text {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px;
            color: #ffe8b0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #ffb800;
        }
        .placed-star:hover .wish-text {
            opacity: 1;
        }
        @keyframes starTwinkle {
            0%,
            100% {
                filter: drop-shadow(0 0 8px #ffd700aa);
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 22px #ffd700ff);
                transform: scale(1.2);
            }
        }
        .star-clear-btn {
            position: absolute;
            bottom: 50px;
            z-index: 4;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #c0a870;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 13px;
            transition: all 0.4s;
            pointer-events: auto;
        }
        .star-clear-btn:hover {
            background: rgba(255, 180, 40, 0.2);
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 28px #ffb80044;
        }

        /* === Section 4: Fortune === */
        .section-fortune {
            position: relative;
        }
        .fortune-container {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .fortune-tube {
            width: 120px;
            height: 240px;
            margin: 0 auto 30px;
            background: linear-gradient(180deg, #3a2020 0%, #1a1018 40%, #0d0a10 100%);
            border-radius: 20px;
            border: 3px solid rgba(200, 140, 40, 0.5);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 2px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fortune-tube:hover {
            border-color: #ffd700;
            box-shadow: 0 20px 60px rgba(255, 160, 20, 0.35), inset 0 2px 0 rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
        }
        .fortune-tube.shaking {
            animation: tubeShake 0.6s ease-in-out;
        }
        @keyframes tubeShake {
            0%,
            100% {
                transform: translateX(0) rotate(0);
            }
            15% {
                transform: translateX(-12px) rotate(-6deg);
            }
            30% {
                transform: translateX(12px) rotate(6deg);
            }
            45% {
                transform: translateX(-8px) rotate(-4deg);
            }
            60% {
                transform: translateX(8px) rotate(4deg);
            }
            75% {
                transform: translateX(-3px) rotate(-1deg);
            }
            90% {
                transform: translateX(3px) rotate(1deg);
            }
        }
        .fortune-tube-inner {
            color: #ffd700;
            font-size: 50px;
            text-shadow: 0 0 20px #ffb800;
            animation: tubeGlow 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes tubeGlow {
            0%,
            100% {
                text-shadow: 0 0 20px #ffb800;
            }
            50% {
                text-shadow: 0 0 40px #ffd700, 0 0 60px #ffa500;
            }
        }
        .fortune-result {
            margin-top: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.5s;
        }
        .fortune-slip {
            background: linear-gradient(135deg, #fff8e7, #ffe4b0, #fff3d0);
            color: #3a2010;
            padding: 20px 28px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 40px #ffb80033;
            animation: slipAppear 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 350px;
            line-height: 1.6;
            position: relative;
        }
        .fortune-slip::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 4px;
            background: #c8960c;
            border-radius: 2px;
        }
        @keyframes slipAppear {
            0% {
                transform: translateY(60px) rotateX(90deg);
                opacity: 0;
            }
            100% {
                transform: translateY(0) rotateX(0);
                opacity: 1;
            }
        }
        .fortune-btn {
            background: transparent;
            border: 2px solid rgba(255, 200, 60, 0.5);
            color: #ffd590;
            padding: 14px 36px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 3px;
            transition: all 0.4s;
            margin-top: 10px;
            font-weight: 600;
        }
        .fortune-btn:hover {
            background: rgba(255, 180, 30, 0.15);
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffb80044;
            color: #fff;
        }

        /* === Section 5: Firework === */
        .section-firework {
            cursor: pointer;
            position: relative;
        }
        .firework-hint {
            font-size: clamp(16px, 2.5vw, 20px);
            letter-spacing: 3px;
            color: rgba(255, 220, 150, 0.8);
            pointer-events: none;
            z-index: 2;
            text-align: center;
            animation: hintBounce 2.5s ease-in-out infinite;
            position: relative;
        }
        .firework-spark-btn {
            position: absolute;
            bottom: 60px;
            z-index: 4;
            background: rgba(255, 150, 30, 0.2);
            border: 2px solid rgba(255, 180, 50, 0.6);
            color: #ffd590;
            padding: 14px 32px;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 3px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.4s;
            pointer-events: auto;
            animation: sparkBtnGlow 2s ease-in-out infinite;
        }
        @keyframes sparkBtnGlow {
            0%,
            100% {
                box-shadow: 0 0 20px #ffa50033;
            }
            50% {
                box-shadow: 0 0 45px #ffa50077, 0 0 80px #ff660044;
            }
        }
        .firework-spark-btn:hover {
            background: rgba(255, 150, 30, 0.4);
            border-color: #ffd700;
            box-shadow: 0 0 50px #ffa50099;
            color: #fff;
            transform: scale(1.05);
        }

        /* === Responsive Nav for Mobile === */
        @media (max-width: 768px) {
            .nav-dots {
                right: 8px;
                gap: 12px;
            }
            .nav-dot {
                width: 10px;
                height: 10px;
            }
            .nav-dot.active {
                width: 12px;
                height: 12px;
            }
            .nav-dot-label {
                display: none;
            }
            .hero-char {
                font-size: clamp(32px, 7vw, 60px);
            }
            .countdown-item {
                padding: 12px 14px;
                min-width: 55px;
                border-radius: 12px;
            }
            .countdown-num {
                font-size: clamp(22px, 4vw, 34px);
            }
            .countdown-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Starfield Canvas -->
    <canvas id="bgCanvas"></canvas>
    <!-- Effects Canvas (fireworks, burst particles) -->
    <canvas id="fxCanvas"></canvas>

    <!-- Navigation Dots -->
    <nav class="nav-dots" id="navDots">
        <div class="nav-dot active" data-index="0"><span class="nav-dot-label">首 页</span></div>
        <div class="nav-dot" data-index="1"><span class="nav-dot-label">加油卡</span></div>
        <div class="nav-dot" data-index="2"><span class="nav-dot-label">许愿星</span></div>
        <div class="nav-dot" data-index="3"><span class="nav-dot-label">幸运签</span></div>
        <div class="nav-dot" data-index="4"><span class="nav-dot-label">烟花盛典</span></div>
    </nav>

    <!-- Sections -->
    <div class="sections-wrapper" id="sectionsWrapper">
        <!-- Section 1: Hero -->
        <section class="section section-hero" data-index="0">
            <div class="hero-title-container">
                <div class="hero-char-row">
                    <span class="hero-char">高</span>
                    <span class="hero-char">考</span>
                </div>
                <div class="hero-char-row">
                    <span class="hero-char">加</span>
                    <span class="hero-char">油</span>
                    <span class="hero-char" style="animation-delay:0.9s;">✨</span>
                </div>
            </div>
            <p class="hero-subtitle">星辰大海 · 未来可期</p>
            <div class="countdown-wrap" id="countdownWrap">
                <div class="countdown-item"><span class="countdown-num" id="cd-days">--</span><span class="countdown-label">天</span></div>
                <div class="countdown-item"><span class="countdown-num" id="cd-hours">--</span><span class="countdown-label">时</span></div>
                <div class="countdown-item"><span class="countdown-num" id="cd-mins">--</span><span class="countdown-label">分</span></div>
                <div class="countdown-item"><span class="countdown-num" id="cd-secs">--</span><span class="countdown-label">秒</span></div>
            </div>
            <div class="hero-hint" id="heroHint">▼ 向下探索 ▼</div>
        </section>

        <!-- Section 2: Flip Cards -->
        <section class="section section-cards" data-index="1">
            <div class="cards-grid" id="cardsGrid"></div>
        </section>

        <!-- Section 3: Star Wish -->
        <section class="section section-stars" data-index="2" id="starSection">
            <div class="star-wish-hint">✨ 点击这片星空，许下你的愿望 ✨</div>
            <button class="star-clear-btn" id="starClearBtn">清空星愿</button>
        </section>

        <!-- Section 4: Fortune -->
        <section class="section section-fortune" data-index="3">
            <div class="fortune-container">
                <div class="fortune-tube" id="fortuneTube" title="点击摇签">
                    <div class="fortune-tube-inner">🏮</div>
                </div>
                <div class="fortune-result" id="fortuneResult"></div>
                <button class="fortune-btn" id="fortuneBtn">🎋 摇 一 摇 抽 签</button>
            </div>
        </section>

        <!-- Section 5: Firework Finale -->
        <section class="section section-firework" data-index="4" id="fireworkSection">
            <div class="firework-hint">🎆 点击任意位置，绽放属于你的烟花 🎆</div>
            <button class="firework-spark-btn" id="fireworkSparkBtn">🔥 连续绽放</button>
        </section>
    </div>

    <script>
        (function() {
            // ==================== DOM REFS ====================
            const bgCanvas = document.getElementById('bgCanvas');
            const bgCtx = bgCanvas.getContext('2d');
            const fxCanvas = document.getElementById('fxCanvas');
            const fxCtx = fxCanvas.getContext('2d');
            const sectionsWrapper = document.getElementById('sectionsWrapper');
            const allSections = document.querySelectorAll('.section');
            const navDots = document.querySelectorAll('.nav-dot');
            const cdDays = document.getElementById('cd-days');
            const cdHours = document.getElementById('cd-hours');
            const cdMins = document.getElementById('cd-mins');
            const cdSecs = document.getElementById('cd-secs');
            const cardsGrid = document.getElementById('cardsGrid');
            const starSection = document.getElementById('starSection');
            const starClearBtn = document.getElementById('starClearBtn');
            const fortuneTube = document.getElementById('fortuneTube');
            const fortuneResult = document.getElementById('fortuneResult');
            const fortuneBtn = document.getElementById('fortuneBtn');
            const fireworkSection = document.getElementById('fireworkSection');
            const fireworkSparkBtn = document.getElementById('fireworkSparkBtn');
            const heroHint = document.getElementById('heroHint');

            // ==================== STATE ====================
            let currentSectionIndex = 0;
            let placedStars = [];
            let isDraggingStar = false;
            let dragStarEl = null;
            let dragOffsetX = 0;
            let dragOffsetY = 0;
            const starWishes = [
                '金榜题名', '心想事成', '旗开得胜', '马到成功', '一举夺魁',
                '前程似锦', '梦想成真', '独占鳌头', '鹏程万里', '未来可期',
                '乘风破浪', '鱼跃龙门', '学业有成', '蟾宫折桂', '青云直上',
                '文思泉涌', '势如破竹', '名列前茅', '一帆风顺', '万试大吉'
            ];

            // Card data
            const cardIcons = ['🌟', '🚀', '📚', '🏆', '💪', '🔥', '✨', '🎓'];
            const cardLabels = ['必胜', '冲刺', '坚持', '梦想', '勇气', '智慧', '幸运', '辉煌'];
            const cardBackMessages = [
                '乾坤未定，你我皆是黑马！',
                '你的名字那么好听，一定会出现在录取通知书上。',
                '今日不肯埋头，明日何以抬头。',
                '星光不问赶路人，时光不负有心人。',
                '半山腰总是最挤的，你得去山顶看看。',
                '一定要优秀，堵住那悠悠之口。',
                '当你在夜晚孤军奋战时，漫天星光都因你而闪烁。',
                '关关难过关关过，前路漫漫亦灿灿。'
            ];

            // Fortune slips
            const fortuneMessages = [
                { text: '大吉 · 金榜题名', desc: '运势如虹，笔下生辉，必中理想学府！' },
                { text: '上吉 · 文思泉涌', desc: '思路清晰，下笔有神，超常发挥！' },
                { text: '中吉 · 稳步前行', desc: '厚积薄发，正常发挥即是胜利。' },
                { text: '小吉 · 贵人相助', desc: '关键时刻有幸运相伴，难题迎刃而解。' },
                { text: '末吉 · 戒骄戒躁', desc: '沉住气，细心检查，惊喜在后头。' },
                { text: '大吉 · 紫气东来', desc: '开门红，第一科旗开得胜！' },
                { text: '上吉 · 势如破竹', desc: '越战越勇，胜利在望！' },
                { text: '中吉 · 金石为开', desc: '精诚所至，努力必有回报。' }
            ];

            // Fireworks particles array
            let fxParticles = [];

            // ==================== CANVAS RESIZE ====================
            function resizeCanvases() {
                bgCanvas.width = window.innerWidth;
                bgCanvas.height = window.innerHeight;
                fxCanvas.width = window.innerWidth;
                fxCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvases);
            resizeCanvases();

            // ==================== BACKGROUND STARS ====================
            const bgStars = [];
            const NUM_BG_STARS = 180;
            for (let i = 0; i < NUM_BG_STARS; i++) {
                bgStars.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    radius: Math.random() * 2.2 + 0.4,
                    brightness: Math.random() * 0.7 + 0.3,
                    speed: Math.random() * 0.08 + 0.02,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinkleOffset: Math.random() * Math.PI * 2
                });
            }

            function drawBackgroundStars() {
                if (!bgCtx) return;
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                const now = Date.now() * 0.001;
                for (const s of bgStars) {
                    const twinkle = Math.sin(now * s.twinkleSpeed * 20 + s.twinkleOffset) * 0.3 + 0.7;
                    const alpha = s.brightness * twinkle * 0.9;
                    bgCtx.beginPath();
                    bgCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    bgCtx.fillStyle = `rgba(255, 230, 180, ${alpha})`;
                    bgCtx.fill();
                    // small glow
                    if (s.radius > 1.3) {
                        bgCtx.beginPath();
                        bgCtx.arc(s.x, s.y, s.radius * 2.2, 0, Math.PI * 2);
                        bgCtx.fillStyle = `rgba(255, 200, 80, ${alpha * 0.18})`;
                        bgCtx.fill();
                    }
                    // move slowly
                    s.y -= s.speed * 0.15;
                    if (s.y < -5) {
                        s.y = bgCanvas.height + 5;
                        s.x = Math.random() * bgCanvas.width;
                    }
                }
                requestAnimationFrame(drawBackgroundStars);
            }
            drawBackgroundStars();

            // ==================== COUNTDOWN ====================
            // Set target date: June
            const examDate = new Date(new Date().getFullYear(), 5, 7, 9, 0, 0);
            if (Date.now() > examDate) examDate.setFullYear(examDate.getFullYear() + 1);
            function updateCountdown() {
                const now = Date.now();
                const diff = examDate - now;
                if (diff <= 0) {
                    cdDays.textContent = '0'; cdHours.textContent = '0'; cdMins.textContent = '0'; cdSecs.textContent = '0';
                    return;
                }
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                cdDays.textContent = days;
                cdHours.textContent = hours;
                cdMins.textContent = mins;
                cdSecs.textContent = secs;
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // ==================== CARDS ====================
            function initCards() {
                cardsGrid.innerHTML = '';
                for (let i = 0; i < cardIcons.length; i++) {
                    const card = document.createElement('div');
                    card.className = 'flip-card';
                    card.innerHTML = `
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <span class="card-icon">${cardIcons[i]}</span>
                                <span class="card-label">${cardLabels[i]}</span>
                            </div>
                            <div class="flip-card-back">${cardBackMessages[i]}</div>
                        </div>
                    `;
                    card.addEventListener('click', () => { card.classList.toggle('flipped'); });
                    cardsGrid.appendChild(card);
                }
            }
            initCards();

            // ==================== STAR WISH ====================
            function createStar(x, y, wishText) {
                const star = document.createElement('div');
                star.className = 'placed-star';
                star.innerHTML = '⭐<span class="wish-text">' + wishText + '</span>';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                starSection.appendChild(star);
                star.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    isDraggingStar = true; dragStarEl = star;
                    const rect = star.getBoundingClientRect();
                    dragOffsetX = e.clientX - rect.left;
                    dragOffsetY = e.clientY - rect.top;
                    star.style.cursor = 'grabbing';
                });
                star.addEventListener('touchstart', (e) => {
                    e.stopPropagation();
                    isDraggingStar = true; dragStarEl = star;
                    const rect = star.getBoundingClientRect();
                    dragOffsetX = e.touches[0].clientX - rect.left;
                    dragOffsetY = e.touches[0].clientY - rect.top;
                }, { passive: false });
                placedStars.push({ element: star, wish: wishText });
                return star;
            }

            starSection.addEventListener('click', (e) => {
                if (isDraggingStar) return;
                if (e.target.classList.contains('placed-star') || e.target.closest('.star-clear-btn')) return;
                const rect = starSection.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const randomWish = starWishes[Math.floor(Math.random() * starWishes.length)];
                createStar(x - 14, y - 14, randomWish);
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDraggingStar || !dragStarEl) return;
                const rect = starSection.getBoundingClientRect();
                let newX = e.clientX - rect.left - dragOffsetX;
                let newY = e.clientY - rect.top - dragOffsetY;
                newX = Math.max(5, Math.min(newX, rect.width - 35));
                newY = Math.max(5, Math.min(newY, rect.height - 35));
                dragStarEl.style.left = newX + 'px';
                dragStarEl.style.top = newY + 'px';
            });
            window.addEventListener('touchmove', (e) => {
                if (!isDraggingStar || !dragStarEl) return;
                e.preventDefault();
                const rect = starSection.getBoundingClientRect();
                let newX = e.touches[0].clientX - rect.left - dragOffsetX;
                let newY = e.touches[0].clientY - rect.top - dragOffsetY;
                newX = Math.max(5, Math.min(newX, rect.width - 35));
                newY = Math.max(5, Math.min(newY, rect.height - 35));
                dragStarEl.style.left = newX + 'px';
                dragStarEl.style.top = newY + 'px';
            }, { passive: false });
            window.addEventListener('mouseup', () => {
                if (dragStarEl) dragStarEl.style.cursor = 'grab';
                isDraggingStar = false; dragStarEl = null;
            });
            window.addEventListener('touchend', () => {
                if (dragStarEl) dragStarEl.style.cursor = 'grab';
                isDraggingStar = false; dragStarEl = null;
            });

            starClearBtn.addEventListener('click', () => {
                placedStars.forEach(s => s.element.remove());
                placedStars = [];
            });

            // ==================== FORTUNE ====================
            function shakeAndDraw() {
                if (fortuneTube.classList.contains('shaking')) return;
                fortuneTube.classList.add('shaking');
                fortuneResult.innerHTML = '';
                setTimeout(() => {
                    fortuneTube.classList.remove('shaking');
                    const randomFortune = fortuneMessages[Math.floor(Math.random() * fortuneMessages.length)];
                    const slip = document.createElement('div');
                    slip.className = 'fortune-slip';
                    slip.innerHTML = `<strong>${randomFortune.text}</strong><br><small>${randomFortune.desc}</small>`;
                    fortuneResult.appendChild(slip);
                }, 600);
            }
            fortuneTube.addEventListener('click', shakeAndDraw);
            fortuneBtn.addEventListener('click', shakeAndDraw);

            // ==================== FIREWORK ====================
            class Particle {
                constructor(x, y, color) {
                    this.x = x; this.y = y;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1; this.color = color;
                    this.size = Math.random() * 4 + 2;
                    this.gravity = 0.08; this.friction = 0.98;
                }
                update() {
                    this.vx *= this.friction; this.vy *= this.friction;
                    this.vy += this.gravity;
                    this.x += this.vx; this.y += this.vy;
                    this.alpha -= 0.015; this.size *= 0.99;
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function spawnFirework(x, y) {
                const colors = ['#ffd700','#ff6b6b','#ff9a56','#ffd166','#f8666e','#ffaa00','#ffdd55','#ff88aa'];
                const count = 40 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    fxParticles.push(new Particle(x, y, color));
                }
            }

            function animateFX() {
                if (!fxCtx) return;
                fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
                for (let i = fxParticles.length - 1; i >= 0; i--) {
                    const p = fxParticles[i];
                    p.update(); p.draw(fxCtx);
                    if (p.alpha <= 0 || p.size < 0.3) fxParticles.splice(i, 1);
                }
                requestAnimationFrame(animateFX);
            }
            animateFX();

            fireworkSection.addEventListener('click', (e) => {
                spawnFirework(e.clientX, e.clientY);
            });

            fireworkSparkBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = fireworkSection.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const ox = (Math.random() - 0.5) * 200;
                        const oy = (Math.random() - 0.5) * 200;
                        spawnFirework(cx + ox, cy + oy);
                    }, i * 200);
                }
            });

            // ==================== NAVIGATION ====================
            function updateActiveSection() {
                let closestIndex = 0, closestDist = Infinity;
                allSections.forEach((sec, index) => {
                    const dist = Math.abs(sec.getBoundingClientRect().top);
                    if (dist < closestDist) { closestDist = dist; closestIndex = index; }
                });
                if (closestIndex !== currentSectionIndex) {
                    currentSectionIndex = closestIndex;
                    navDots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentSectionIndex));
                }
            }
            window.addEventListener('scroll', updateActiveSection, { passive: true });

            navDots.forEach(dot => {
                dot.addEventListener('click', () => {
                    allSections[parseInt(dot.dataset.index)].scrollIntoView({ behavior: 'smooth' });
                });
            });

            heroHint.addEventListener('click', () => {
                allSections[1].scrollIntoView({ behavior: 'smooth' });
            });

            setTimeout(updateActiveSection, 100);
        })();
    </script>
</body>
</html>
